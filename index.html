<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>世界读书日阅读挑战</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f6eedc;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      touch-action: manipulation;
    }

    button {
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    img {
      display: block;
      width: 100%;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transition: transform 0.65s ease, opacity 0.35s ease;
      will-change: transform, opacity;
      overflow: hidden;
    }

    .layer-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #page1 {
      z-index: 20;
      transform: translateY(0);
    }

    #page1.leave-up {
      transform: translateY(-100%);
    }

    #page2 {
      z-index: 10;
      transform: translateY(100%);
    }

    #page2.show {
      transform: translateY(0);
    }

    #page3,
    #page4,
    #page5,
    #page7 {
      transform: none;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }

    #page3 {
      z-index: 30;
    }

    #page4 {
      z-index: 40;
    }

    #page5 {
      z-index: 50;
    }

    #page7 {
      z-index: 60;
    }

    #page3.show,
    #page4.show,
    #page5.show,
    #page7.show {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .p3-screen {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .p3-screen.show {
      opacity: 1;
      pointer-events: auto;
    }

    .countdown-badge {
      position: absolute;
      top: 25%;
      right: 15%;
      width: 10vw;
      height: 10vw;
      border-radius: 50%;
      border: 0.5vw solid rgba(164, 204, 226, 0.9);
      background: rgba(241, 250, 255, 0.9);
      color: #87abc4;
      font-size: 3.6vw;
      font-weight: 600;
      text-align: center;
      letter-spacing: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 4;
    }

    .finished-btn,
    .submit-btn,
    .continue-btn,
    .complete-btn {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      transition: opacity 0.2s ease, transform 0.15s ease;
      z-index: 4;
    }

    .finished-btn {
      bottom: 5%;
      width: 44vw;
      opacity: 0.52;
      pointer-events: none;
    }

    .submit-btn {
      bottom: 8%;
      width: 40vw;
      opacity: 1;
      pointer-events: auto;
    }

    .continue-btn {
      bottom: 7%;
      width: 42vw;
      opacity: 1;
      pointer-events: auto;
    }

    .complete-btn {
      bottom: 7%;
      width: 36vw;
      opacity: 0.52;
      pointer-events: none;
      z-index: 5;
    }

    .complete-btn.enabled {
      opacity: 1;
      pointer-events: auto;
    }

    .finished-btn.enabled {
      opacity: 1;
      pointer-events: auto;
    }

    .finished-btn.enabled:active,
    .submit-btn:active,
    .continue-btn:active,
    .complete-btn.enabled:active {
      transform: translateX(-50%) scale(0.97);
    }

    .p6-mask {
      position: absolute;
      inset: 0;
      z-index: 70;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4vw;
      background: rgba(8, 6, 4, 0.78);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .p6-mask.show {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .p6-card {
      position: relative;
      width: 96vw;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .p6-image {
      width: 100%;
      height: auto;
    }

    .p6-close {
      position: absolute;
      top: 19%;
      right: 7%;
      width: 8vw;
      z-index: 2;
    }

    .p6-lottery-btn {
      position: absolute;
      left: 50%;
      bottom: 35%;
      width: 38vw;
      transform: translateX(-50%);
      z-index: 2;
    }

    .p6-close:active {
      opacity: 0.86;
      transform: scale(0.95);
    }

    .p6-lottery-btn:active {
      opacity: 0.86;
      transform: translateX(-50%) scale(0.97);
    }

    .p7-primary-btn,
    .p7-secondary-btn {
      position: absolute;
      bottom: 7%;
      width: 38vw;
      z-index: 4;
      transition: opacity 0.2s ease, transform 0.15s ease;
    }

    .p7-primary-btn {
      left: 50%;
      transform: translateX(-50%);
    }

    .p7-secondary-btn {
      left: 8%;
    }

    .p7-two-buttons .p7-primary-btn {
      left: auto;
      right: 8%;
      transform: none;
    }

    .p7-two-buttons .p7-secondary-btn {
      display: block;
    }

    .p7-single-button .p7-secondary-btn {
      display: none;
    }

    .p7-single-button .p7-primary-btn {
      left: 50%;
      right: auto;
      transform: translateX(-50%);
    }

    .p7-primary-btn:active,
    .p7-secondary-btn:active {
      opacity: 0.86;
      transform: translateX(-50%) scale(0.97);
    }

    .p7-two-buttons .p7-primary-btn:active {
      transform: scale(0.97);
    }

    .p7-two-buttons .p7-secondary-btn:active {
      transform: scale(0.97);
    }

    .p7-address-mask,
    .p8-share-mask {
      position: absolute;
      inset: 0;
      z-index: 80;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4vw;
      background: rgba(8, 6, 4, 0.78);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .p7-address-mask.show,
    .p8-share-mask.show {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .p7-address-card {
      position: relative;
      width: 96vw;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .p7-address-image {
      width: 100%;
      height: auto;
    }

    .p7-address-close {
      position: absolute;
      top: 19%;
      right: 7%;
      width: 8vw;
      z-index: 3;
    }

    .p7-form {
      position: absolute;
      top: 34.5%;
      left: 18%;
      width: 64%;
      z-index: 4;
      display: flex;
      flex-direction: column;
      gap: 2.8vw;
    }

    .p7-input,
    .p7-textarea {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: #9c6330;
      font-size: 3.8vw;
      line-height: 1.4;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    }

    .p7-input {
      height: 7.4vw;
      padding-left: 37%;
      padding-right: 2%;
    }

    .p7-textarea {
      min-height: 17vw;
      resize: none;
      padding-top: 1.5%;
      padding-left: 24%;
      padding-right: 2%;
      text-indent: 25%;
    }

    .p7-input::placeholder,
    .p7-textarea::placeholder {
      color: transparent;
    }

    .p7-confirm-btn {
      position: absolute;
      left: 50%;
      bottom: 18%;
      width: 34vw;
      transform: translateX(-50%);
      z-index: 4;
      opacity: 0.52;
      pointer-events: none;
    }

    .p7-confirm-btn.enabled {
      opacity: 1;
      pointer-events: auto;
    }

    .p7-address-close:active {
      opacity: 0.86;
      transform: scale(0.95);
    }

    .p7-confirm-btn.enabled:active {
      opacity: 0.86;
      transform: translateX(-50%) scale(0.97);
    }

    .p8-share-content {
      position: relative;
      width: 92vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6vw;
    }

    .p8-poster {
      width: 100%;
      height: auto;
      border-radius: 2vw;
    }

    .p8-save-text {
      width: 23%;
      height: auto;
    }

    .p8-close {
      position: absolute;
      top: 4%;
      right: 2%;
      width: 8vw;
      z-index: 5;
    }

    .p8-close:active {
      opacity: 0.86;
      transform: scale(0.95);
    }

    .p5-input-wrap {
      position: absolute;
      top: 31%;
      left: 24%;
      width: 52%;
      height: 40%;
      z-index: 4;
    }

    .p5-guiding-text {
      position: absolute;
      top: 8%;
      left: 50%;
      width: 76%;
      transform: translateX(-50%);
      opacity: 0.95;
      transition: opacity 0.2s ease;
      z-index: 5;
    }

    .p5-guiding-text.hidden {
      opacity: 0;
    }

    .p5-textarea {
      width: 100%;
      height: 100%;
      resize: none;
      border: none;
      outline: none;
      background: transparent;
      color: #83542f;
      font-size: 4.2vw;
      line-height: 1.55;
      padding: 8% 7% 4% 8%;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      caret-color: #4f8ab4;
    }

    .p5-textarea::placeholder {
      color: transparent;
    }

    .p3-question-panel {
      position: absolute;
      top: 34%;
      left: 9%;
      width: 82%;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .p3-question-title {
      width: 82%;
      margin-bottom: 4.5vw;
    }

    .p3-option-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8.8vw;
    }

    .p3-option-btn {
      width: 78%;
      border: 0.3vw solid transparent;
      border-radius: 100vmax;
      overflow: hidden;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .p3-option-btn:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .music-btn {
      position: absolute;
      top: calc(env(safe-area-inset-top) + 3.5vw);
      left: calc(env(safe-area-inset-left) + 3.5vw);
      width: 9vw;
      height: 9vw;
      z-index: 90;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .music-btn.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .music-btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .unlock-btn {
      position: absolute;
      left: 50%;
      bottom: 13%;
      width: 6.7vw;
      transform: translateX(-50%);
      z-index: 30;
      animation: unlockPulse 1.8s ease-in-out infinite;
    }

    @keyframes unlockPulse {
      0%,
      100% {
        opacity: 0.68;
        transform: translateX(-50%) scale(0.94);
      }
      50% {
        opacity: 1;
        transform: translateX(-50%) scale(1.05);
      }
    }

    .swipe-tip {
      position: absolute;
      left: 50%;
      bottom: 8%;
      width: 24vw;
      transform: translateX(-50%);
      z-index: 30;
    }

    .quiz-panel {
      position: absolute;
      top: 22%;
      left: 5.8%;
      width: 86%;
      height: 65%;
      z-index: 20;
      overflow: hidden;
      border-radius: 2.4vw;
    }

    .quiz-scroll {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 3% 4% 5%;
      scrollbar-width: none;
    }

    .quiz-scroll::-webkit-scrollbar {
      display: none;
    }

    .question-block + .question-block {
      margin-top: 0.9vw;
    }

    .question-title {
      width: 94%;
      margin-bottom: 3vw;
    }

    .option-list {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.18vw;
    }

    .option-btn {
      width: 88%;
      height: auto;
      aspect-ratio: 908 / 86;
      border: 0.3vw solid transparent;
      border-radius: 100vmax;
      overflow: hidden;
      background-position: top left;
      background-repeat: no-repeat;
      background-size: 100% auto;
      filter: drop-shadow(0 0.3vw 0.8vw rgba(0, 0, 0, 0.06));
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .option-btn:active {
      transform: scale(0.98);
      opacity: 0.88;
    }

    .popup-mask {
      position: absolute;
      inset: 0;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4vw;
      background: rgba(8, 6, 4, 0.78);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .popup-mask.show {
      opacity: 1;
      pointer-events: auto;
    }

    .popup-card {
      position: relative;
      width: 96vw;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .popup-image {
      width: 100%;
      height: auto;
    }

    .popup-close {
      position: absolute;
      top: 19%;
      right: 7%;
      width: 8vw;
      z-index: 2;
    }

    .popup-enter {
      position: absolute;
      left: 50%;
      bottom: 36%;
      width: 38vw;
      transform: translateX(-50%);
      z-index: 2;
    }

    .popup-enter:active,
    .popup-close:active {
      opacity: 0.86;
    }

    .popup-enter:active {
      transform: translateX(-50%) scale(0.98);
    }

    .popup-close:active {
      transform: scale(0.95);
    }

    @media (max-aspect-ratio: 9/16) {
      .quiz-panel {
        top: 21.5%;
        left: 5.8%;
        height: 65.5%;
      }

      .question-block + .question-block {
        margin-top: 0.8vw;
      }

      .option-list {
        gap: 0.15vw;
      }

      .p3-question-panel {
        top: 32%;
      }

      .p3-option-list {
        gap: 8vw;
      }

      .p5-input-wrap {
        top: 29%;
        left: 20%;
        width: 60%;
        height: 39%;
      }

    }
  </style>
</head>

          <div class="p7-form">
            <input id="recipientInput" class="p7-input" type="text" maxlength="20" placeholder="请输入收件人">

            <textarea id="addressInput" class="p7-textarea" maxlength="80" placeholder="请输入详细地址"></textarea>

          <button id="p7ConfirmBtn" class="p7-confirm-btn" type="button" aria-label="确认地址">
            <img src="./assets/p7/confirm.png" alt="确认">

      <div id="p8ShareMask" class="p8-share-mask" aria-hidden="true">
        <div class="p8-share-content">
          <button id="p8CloseBtn" class="p8-close" type="button" aria-label="关闭分享海报">
            <img src="./assets/p8/close.png" alt="关闭">

          <img class="p8-poster" src="./assets/p8/poster.png" alt="分享海报">

    <section id="page1" class="layer" aria-label="封面页">
      <img class="layer-bg" src="./assets/p1/backgroundimage.png" alt="封面背景">
      <button id="unlockBtn" class="unlock-btn" type="button" aria-label="进入答题页">
        <img src="./assets/p1/unlock.png" alt="解锁按钮">
      </button>
      <img class="swipe-tip" src="./assets/p1/Slide_up_the_screen_to_continue.png" alt="上滑屏幕继续">
    </section>
  </div>

  <script>
    (() => {
      var phone = window.phone || "";

      const p7ResultBg = document.getElementById("p7ResultBg");
      const p7PrimaryBtn = document.getElementById("p7PrimaryBtn");

      const p7SecondaryBtn = document.getElementById("p7SecondaryBtn");

      const bgMusic = document.getElementById("bgMusic");

      let touchStartY = 0;

      function getStoredMusicPreference() {
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          return stored === null ? true : stored === "true";
        } catch (error) {
          return true;
        }
      }

      function storeMusicPreference(enabled) {
        try {
          localStorage.setItem(STORAGE_KEY, String(enabled));
        } catch (error) {
          /* ignore storage failures */
        }
      }

      function getTodayDrawKey() {
        const now = new Date();
        const month = `${now.getMonth() + 1}`.padStart(2, "0");
        const day = `${now.getDate()}`.padStart(2, "0");
        return `${now.getFullYear()}-${month}-${day}`;
      }

      function getDrawState() {
        const today = getTodayDrawKey();
        try {
          const raw = localStorage.getItem(DRAW_STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : null;
          if (parsed && parsed.date === today && Number.isFinite(parsed.count)) {
            return parsed;
          }
        } catch (error) {
          /* ignore storage failures */
        }
        return { date: today, count: 0 };
      }

      function saveDrawState(drawState) {
        try {
          localStorage.setItem(DRAW_STORAGE_KEY, JSON.stringify(drawState));
        } catch (error) {
          /* ignore storage failures */
        }
      }

      function syncMusicIcon() {
        const shouldShowOpen = state.musicEnabled;
        musicIcon.src = shouldShowOpen ? "./assets/music_open.png" : "./assets/music_Close.png";
      }

      function tryPlayMusic() {
        if (!state.musicEnabled) {
          bgMusic.pause();
          bgMusic.muted = true;
          syncMusicIcon();
          return;
        }

        bgMusic.muted = false;
        const promise = bgMusic.play();
        if (promise && typeof promise.then === "function") {
          promise
            .then(() => {
              syncMusicIcon();
            })
            .catch(() => {
              syncMusicIcon();
            });
        } else {
          syncMusicIcon();
        }
      }

      function activateMusicOnEntry() {
        state.musicEnabled = true;
        storeMusicPreference(true);
        tryPlayMusic();
      }

      function retryMusicAfterGesture() {
        if (!state.pageEntered || !state.musicEnabled) {
          return;
        }
        if (bgMusic.paused || bgMusic.muted) {
          tryPlayMusic();
        }
      }

      function toggleMusic() {
        state.musicEnabled = !state.musicEnabled;
        storeMusicPreference(state.musicEnabled);

        if (state.musicEnabled) {
          tryPlayMusic();
        } else {
          bgMusic.pause();
          bgMusic.muted = true;
          syncMusicIcon();
        }
      }

      function showPopup() {
        state.popupVisible = true;
        popupMask.classList.add("show");
        popupMask.setAttribute("aria-hidden", "false");
      }

      function hidePopup() {
        state.popupVisible = false;
        popupMask.classList.remove("show");
        popupMask.setAttribute("aria-hidden", "true");
      }

      function getP3SetAssets(index) {
        return {
          reading: `./assets/p3/text${index}.png`,
          question: `./assets/p3/text${index}-Q.png`,
          options: [
            {
              id: "1",
              defaultSrc: `./assets/p3/text${index}-Q-option1.png`,
              selectedSrc: `./assets/p3/text${index}-Q-option1_Select.png`
            },
            {
              id: "2",
              defaultSrc: `./assets/p3/text${index}-Q-option2.png`,
              selectedSrc: `./assets/p3/text${index}-Q-option2_Select.png`
            },
            {
              id: "3",
              defaultSrc: `./assets/p3/text${index}-Q-option3.png`,
              selectedSrc: `./assets/p3/text${index}-Q-option3_Select.png`
            }
          ]
        };
      }

      function updateCountdownBadge() {
        countdownBadge.textContent = `${state.p3ReadingSeconds}秒`;
      }

      function clearP3Countdown() {
        if (!state.p3CountdownTimer) {
          return;
        }
        window.clearInterval(state.p3CountdownTimer);
        state.p3CountdownTimer = null;
      }

      function lockFinishedReadingButton() {
        finishedReadingBtn.classList.remove("enabled");
      }

      function unlockFinishedReadingButton() {
        finishedReadingBtn.classList.add("enabled");
      }

      function startP3Countdown() {
        clearP3Countdown();
        state.p3ReadingSeconds = P3_READING_SECONDS;
        updateCountdownBadge();
        lockFinishedReadingButton();

        if (state.p3ReadingSeconds <= 0) {
          unlockFinishedReadingButton();
          return;
        }

        state.p3CountdownTimer = window.setInterval(() => {
          state.p3ReadingSeconds -= 1;
          if (state.p3ReadingSeconds <= 0) {
            state.p3ReadingSeconds = 0;
            clearP3Countdown();
            unlockFinishedReadingButton();
          }
          updateCountdownBadge();
        }, 1000);
      }

      function syncP3SubmitButtonState() {
        if (state.p3SelectedOption) {
          submitAnswerBtn.classList.add("enabled");
        } else {
          submitAnswerBtn.classList.remove("enabled");
        }
      }

      function renderP3QuestionOptions() {
        const assets = getP3SetAssets(state.p3SetIndex);
        p3OptionList.innerHTML = "";

        assets.options.forEach((option) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "p3-option-btn";
          button.dataset.optionId = option.id;
          button.dataset.defaultSrc = option.defaultSrc;
          button.dataset.selectedSrc = option.selectedSrc;
          button.setAttribute("aria-label", `p3-option-${option.id}`);
          button.setAttribute("aria-pressed", "false");

          const image = document.createElement("img");
          image.src = option.defaultSrc;
          image.alt = "";
          button.appendChild(image);

          button.addEventListener("click", () => {
            state.p3SelectedOption = option.id;
            const allButtons = p3OptionList.querySelectorAll(".p3-option-btn");
            allButtons.forEach((item) => {
              const selected = item.dataset.optionId === option.id;
              item.setAttribute("aria-pressed", String(selected));
              const optionImg = item.querySelector("img");
              if (optionImg) {
                optionImg.src = selected ? item.dataset.selectedSrc : item.dataset.defaultSrc;
              }
            });
            syncP3SubmitButtonState();
          });

          p3OptionList.appendChild(button);
        });
      }

      function enterP3QuestionScreen() {
        p3ReadingScreen.classList.remove("show");
        p3QuestionScreen.classList.add("show");
      }

      function enterP3ReadingScreen() {
        p3QuestionScreen.classList.remove("show");
        p3ReadingScreen.classList.add("show");
      }

      function showP4Result() {
        const correctAnswer = P3_CORRECT_ANSWERS[state.p3SetIndex];
        state.p3AnswerCorrect = state.p3SelectedOption === correctAnswer;
        p4ResultBg.src = state.p3AnswerCorrect
          ? "./assets/p4/Correctanswer.png"
          : "./assets/p4/Incorrectanswer.png";
        page3.classList.remove("show");
        page4.classList.add("show");
      }

      function enterP5Page() {
        page4.classList.remove("show");
        page5.classList.add("show");
        hideP6LotteryPopup();
        if (p5Textarea) {
          window.setTimeout(() => {
            p5Textarea.focus();
          }, 80);
        }
      }

      function syncP5GuidingText() {
        if (!p5GuidingText || !p5Textarea) {
          return;
        }
        const hasValue = p5Textarea.value.trim().length > 0;
        p5GuidingText.classList.toggle("hidden", hasValue);
        completeBtn.classList.toggle("enabled", hasValue);
      }

      function showP6LotteryPopup() {
        p6LotteryMask.classList.add("show");
        p6LotteryMask.setAttribute("aria-hidden", "false");
      }

      function hideP6LotteryPopup() {
        p6LotteryMask.classList.remove("show");
        p6LotteryMask.setAttribute("aria-hidden", "true");
      }

      function showP7AddressPopup() {
        p7AddressMask.classList.add("show");
        p7AddressMask.setAttribute("aria-hidden", "false");

        p7AddressMask.setAttribute("aria-hidden", "true");

      function showP7WinPage() {
        page5.classList.remove("show");

        p7PrimaryBtnImg.src = "./assets/p7/address.png";

      }

      function showP7LosePage(limitReached) {
        page5.classList.remove("show");
        if (limitReached) {
          page7.className = "layer show p7-single-button";
          p7ResultBg.src = "./assets/p7/Noawarddetailspage2.png";
          p7PrimaryBtnImg.src = "./assets/p7/Sharing.png";
          p7PrimaryBtn.setAttribute("aria-label", "分享活动");
        } else {
          page7.className = "layer show p7-two-buttons";
          p7ResultBg.src = "./assets/p7/Noawarddetailspage.png";
          p7PrimaryBtnImg.src = "./assets/p7/Sharing.png";
          p7PrimaryBtn.setAttribute("aria-label", "分享活动");
          p7SecondaryBtnImg.src = "./assets/p7/one_more_draw.png";
          p7SecondaryBtn.setAttribute("aria-label", "再抽一次");
        }
      }

      function runMockLottery() {
        const drawState = getDrawState();
        if (drawState.count >= 3) {
          showP7LosePage(true);
          return;
        }

        drawState.count += 1;
        saveDrawState(drawState);

        const isWin = Math.random() < 0.35;
        if (isWin) {
          showP7WinPage();
          return;
        }

        showP7LosePage(drawState.count >= 3);
      }

      function isP7AddressValid() {
        const recipient = recipientInput.value.trim();
        const phone = phoneInput.value.trim();
        const address = addressInput.value.trim();
        return Boolean(recipient && phone && /^\d+$/.test(phone) && address);
      }

      function syncP7ConfirmButtonState() {
        p7ConfirmBtn.classList.toggle("enabled", isP7AddressValid());
      }

      function startP3ChallengeFlow() {
        state.p3SetIndex = Math.floor(Math.random() * P3_SET_COUNT) + 1;
        state.p3SelectedOption = "";
        state.p3AnswerCorrect = false;
        syncP3SubmitButtonState();
        hidePopup();
        page5.classList.remove("show");
        p5Textarea.value = "";
        syncP5GuidingText();
        hideP6LotteryPopup();
        hideP7AddressPopup();
        hideP8SharePopup();
        page7.classList.remove("show");
        recipientInput.value = "";
        phoneInput.value = "";
        addressInput.value = "";
        syncP7ConfirmButtonState();

        const assets = getP3SetAssets(state.p3SetIndex);
        p3ReadingBg.src = assets.reading;
        p3QuestionTitle.src = assets.question;
        renderP3QuestionOptions();
        enterP3ReadingScreen();
        startP3Countdown();

        page2.classList.remove("show");
        page3.classList.add("show");
        page4.classList.remove("show");
      }

      function allQuestionsAnswered() {
        return questions.every((question) => Boolean(state.answers[question.id]));
      }

      function handleOptionSelect(questionId, optionId) {
        state.answers[questionId] = optionId;

        const optionButtons = quizContainer.querySelectorAll(`[data-question-id="${questionId}"]`);
        optionButtons.forEach((button) => {
          const isSelected = button.dataset.optionId === optionId;
          button.style.backgroundImage = `url("${isSelected ? button.dataset.selectedSrc : button.dataset.defaultSrc}")`;
          button.setAttribute("aria-pressed", String(isSelected));
        });

        if (allQuestionsAnswered()) {
          showPopup();
        }
      }

      function createQuestionBlock(question) {
        const wrapper = document.createElement("section");
        wrapper.className = "question-block";

        const title = document.createElement("img");
        title.className = "question-title";
        title.src = question.title;
        title.alt = "问题";
        wrapper.appendChild(title);

        const optionList = document.createElement("div");
        optionList.className = "option-list";

        question.options.forEach((option) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "option-btn";
          button.dataset.questionId = question.id;
          button.dataset.optionId = option.id;
          button.dataset.defaultSrc = option.defaultSrc;
          button.dataset.selectedSrc = option.selectedSrc;
          button.setAttribute("aria-label", `${question.id}-${option.id}`);
          button.setAttribute("aria-pressed", "false");
          button.style.backgroundImage = `url("${option.defaultSrc}")`;
          button.addEventListener("click", () => handleOptionSelect(question.id, option.id));
          optionList.appendChild(button);
        });

        wrapper.appendChild(optionList);
        return wrapper;
      }

      function renderQuestions() {
        quizContainer.innerHTML = "";
        questions.forEach((question) => {
          quizContainer.appendChild(createQuestionBlock(question));
        });
      }

      function enterPage2() {
        if (state.pageEntered) {
          return;
        }

        state.pageEntered = true;
        page2.classList.add("show");
        page1.classList.add("leave-up");
        musicBtn.classList.add("visible");
        activateMusicOnEntry();
        requestAnimationFrame(() => {
          retryMusicAfterGesture();
        });
      }

      function handleBeginChallenge() {
        startP3ChallengeFlow();
      }

      function preloadImages() {
        const imageUrls = [
          "./assets/p1/backgroundimage.png",
          "./assets/p1/unlock.png",
          "./assets/p2/backgroundimage.png",
          "./assets/p2/pop-up_notification-read.png",
          "./assets/p2/close.png",
          "./assets/p2/begin_the_challenge.png",
          "./assets/p3/background_qusetion-image.png",
          "./assets/p3/finished_reading.png",
          "./assets/p3/Submit_answer.png",
          "./assets/p4/Correctanswer.png",
          "./assets/p4/Incorrectanswer.png",
          "./assets/p4/Continue.png",
          "./assets/p5/background_image.png",
          "./assets/p5/GuidingText.png",
          "./assets/p5/complete.png",
          "./assets/p6/Lottery_pop-up-window.png",
          "./assets/p6/lottery.png",
          "./assets/p6/close.png",
          "./assets/p7/Awarddetailspage.png",
          "./assets/p7/Noawarddetailspage.png",
          "./assets/p7/Noawarddetailspage2.png",
          "./assets/p7/address.png",
          "./assets/p7/one_more_draw.png",
          "./assets/p7/Sharing.png",
          "./assets/p7/Addresspage-notext.png",
          "./assets/p7/confirm.png",
          "./assets/p8/poster.png",
          "./assets/p8/Save_poster_text.png",
          "./assets/music_open.png",
          "./assets/music_Close.png"
        ];

        questions.forEach((question) => {
          imageUrls.push(question.title);
          question.options.forEach((option) => {
            imageUrls.push(option.defaultSrc, option.selectedSrc);
          });
        });

        for (let i = 1; i <= P3_SET_COUNT; i += 1) {
          const assets = getP3SetAssets(i);
          imageUrls.push(assets.reading, assets.question);
          assets.options.forEach((option) => {
            imageUrls.push(option.defaultSrc, option.selectedSrc);
          });
        }

        imageUrls.forEach((url) => {
          const image = new Image();
          image.src = url;
        });
      }

      unlockBtn.addEventListener("click", () => {
        activateMusicOnEntry();
        enterPage2();
      });
      musicBtn.addEventListener("click", toggleMusic);
      popupClose.addEventListener("click", hidePopup);
      popupMask.addEventListener("click", (event) => {
        if (event.target === popupMask) {
          hidePopup();
        }
      });
      popupEnter.addEventListener("click", handleBeginChallenge);
      finishedReadingBtn.addEventListener("click", () => {
        if (state.p3ReadingSeconds > 0) {
          return;
        }
        enterP3QuestionScreen();
      });
      submitAnswerBtn.addEventListener("click", () => {
        if (!state.p3SelectedOption) {
          return;
        }

        window.dispatchEvent(new CustomEvent("readingweek:p3Submit", {
          detail: {
            setIndex: state.p3SetIndex,
            selectedOption: state.p3SelectedOption,
            correctAnswer: P3_CORRECT_ANSWERS[state.p3SetIndex],
            isCorrect: state.p3SelectedOption === P3_CORRECT_ANSWERS[state.p3SetIndex]
          }
        }));
        showP4Result();
      });
      continueBtn.addEventListener("click", () => {
        window.dispatchEvent(new CustomEvent("readingweek:p4Continue", {
          detail: {
            setIndex: state.p3SetIndex,
            selectedOption: state.p3SelectedOption,
            correctAnswer: P3_CORRECT_ANSWERS[state.p3SetIndex],
            isCorrect: state.p3AnswerCorrect
          }
        }));
        enterP5Page();
      });
      p5Textarea.addEventListener("input", syncP5GuidingText);
      completeBtn.addEventListener("click", () => {
        const reflection = p5Textarea.value.trim();
        if (!reflection) {
          return;
        }
        showP6LotteryPopup();
      });
      p6CloseBtn.addEventListener("click", hideP6LotteryPopup);
      p6LotteryBtn.addEventListener("click", () => {
        const reflection = p5Textarea.value.trim();
        runMockLottery();
        hideP6LotteryPopup();

        window.dispatchEvent(new CustomEvent("readingweek:p5Complete", {
          detail: {
            setIndex: state.p3SetIndex,
            selectedOption: state.p3SelectedOption,
            isCorrect: state.p3AnswerCorrect,
            reflection
          }
        }));

        if (NEXT_PAGE_URL) {
          window.location.href = NEXT_PAGE_URL;
          return;
        }

        console.info("P5 completed:", {
          setIndex: state.p3SetIndex,
          selectedOption: state.p3SelectedOption,
          isCorrect: state.p3AnswerCorrect,
          reflection
        });
      });
      p7PrimaryBtn.addEventListener("click", () => {
        const isWinPage = p7ResultBg.src.includes("Awarddetailspage.png");
        if (isWinPage) {
          showP7AddressPopup();
          return;
        }
        showP8SharePopup();
      });
      p7SecondaryBtn.addEventListener("click", startP3ChallengeFlow);
      p7AddressClose.addEventListener("click", hideP7AddressPopup);
      phoneInput.addEventListener("input", () => {
        phoneInput.value = phoneInput.value.replace(/\D+/g, "");
        syncP7ConfirmButtonState();
      });
      recipientInput.addEventListener("input", syncP7ConfirmButtonState);
      addressInput.addEventListener("input", syncP7ConfirmButtonState);
      p7AddressMask.addEventListener("click", (event) => {
        if (event.target === p7AddressMask) {
          hideP7AddressPopup();
        }
      });
      p7ConfirmBtn.addEventListener("click", () => {
        if (!isP7AddressValid()) {
          return;
        }

        const recipient = recipientInput.value.trim();
        const phone = phoneInput.value.trim();
        const address = addressInput.value.trim();

        window.dispatchEvent(new CustomEvent("readingweek:p7AddressSubmit", {
          detail: {
            recipient,
            phone,
            address,
            setIndex: state.p3SetIndex
          }
        }));

        hideP7AddressPopup();

        if (NEXT_PAGE_URL) {
          window.location.href = NEXT_PAGE_URL;
          return;
        }

        console.info("P7 address submitted:", {
          recipient,
          phone,
          address,
          setIndex: state.p3SetIndex
        });
      });
      p8ShareMask.addEventListener("click", (event) => {
        if (event.target === p8ShareMask) {
          hideP8SharePopup();
        }
      });
      p8CloseBtn.addEventListener("click", hideP8SharePopup);

      page1.addEventListener("touchstart", (event) => {
        touchStartY = event.touches[0].clientY;
      }, { passive: true });

      page1.addEventListener("touchend", (event) => {
        const touchEndY = event.changedTouches[0].clientY;
        if (touchStartY - touchEndY > SWIPE_THRESHOLD) {
          activateMusicOnEntry();
          enterPage2();
        }
      }, { passive: true });

      page1.addEventListener("wheel", (event) => {
        if (event.deltaY > 20) {
          activateMusicOnEntry();
          enterPage2();
        }
      }, { passive: true });

      // 模仿参考项目：进入后先播一次，若被系统拦截，再在首次手势时补播
      ["touchstart", "touchend", "click"].forEach((eventName) => {
        document.addEventListener(eventName, retryMusicAfterGesture, { passive: true });
      });
      document.addEventListener("WeixinJSBridgeReady", retryMusicAfterGesture, false);

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          bgMusic.pause();
          syncMusicIcon();
          return;
        }

        if (state.pageEntered && state.musicEnabled) {
          tryPlayMusic();
        }
      });

      bgMusic.addEventListener("play", syncMusicIcon);
      bgMusic.addEventListener("pause", syncMusicIcon);
      bgMusic.addEventListener("error", syncMusicIcon);
      window.addEventListener("beforeunload", clearP3Countdown);

      renderQuestions();
      preloadImages();
      syncMusicIcon();
      syncP5GuidingText();
      syncP7ConfirmButtonState();
    })();
  </script>
</body>
</html>
